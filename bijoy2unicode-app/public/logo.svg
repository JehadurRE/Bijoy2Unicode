<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="bijoy2unicode">
  <title>bijoy2unicode</title>
  <defs>
    <linearGradient id="b2uGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Mark: A rounded square with a Bengali "অ" silhouette transitioning to a Unicode "অ" -->
  <g>
    <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#b2uGrad)"/>
    <!-- Bengali "অ" centered in the mark, white -->
    <text x="32" y="46" text-anchor="middle"
          font-family="'Noto Sans Bengali', 'Hind Siliguri', 'Kalpurush', 'SolaimanLipi', system-ui, sans-serif"
          font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">অ</text>
    <!-- A subtle arrow accent in the corner suggesting conversion -->
    <path d="M52 14 L58 14 L58 20" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M50 22 L58 14" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(76, 0)">
    <text x="0" y="32" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="700" fill="currentColor">bijoy</text>
    <text x="64" y="32" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="700" fill="#16a34a">2</text>
    <text x="78" y="32" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="700" fill="currentColor">unicode</text>
    <text x="0" y="52" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="11" font-weight="500" fill="currentColor" opacity="0.55" letter-spacing="0.5">
      Bijoy → Unicode Bangla converter
    </text>
  </g>
</svg>
